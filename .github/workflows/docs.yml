# Build Antora docs (Root Strategy). See docs/modules/publishing/pages/antora-deployment.adoc
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'antora-playbook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'antora-playbook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        id: antora
        uses: antora-supplemental/antora-build-action@v2
        with:
          playbook: antora-playbook.yml
          output_dir: build/site
          install_dependencies: false
          setup_pnpm: false
          setup_node: false
          fetch: true
