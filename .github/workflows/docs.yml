# Build Antora docs (Root Strategy). See docs/modules/publishing/pages/antora-deployment.adoc
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'antora-playbook.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'antora-playbook.yml'
      - '.github/workflows/docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build docs
        run: pnpm dlx antora antora-playbook.yml
